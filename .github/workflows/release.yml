name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

  testflight:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build and submit to TestFlight
        id: deploy
        run: eas build --platform ios --profile production --auto-submit --non-interactive

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: ./.github/actions/notify-discord-deploy
        with:
          webhook-url: ${{ secrets.DISCORD_APP_DEPLOY_WEBHOOK_URL }}
          deploy-type: iOS TestFlight Build
          deploy-status: ${{ steps.deploy.outcome }}
          ref-name: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          repository: ${{ github.repository }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
